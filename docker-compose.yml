services:
  mysql:
    image: mysql:8.0
    container_name: thelastclicks-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thelastclicks
    ports:
      - "3306:3306"
    volumes:
      - thelastclicks-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  thelastclicks-mysql-data:
