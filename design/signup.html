<main>
  <section class="auth" data-screen-label="01 Signup">
    <div class="auth__media clip-reveal">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=1600&q=85" alt="" decoding="async">
      <div class="quote">"Show your craft to the brands that need it."</div>

    <div class="auth__form">
      <div>
        <span class="kicker">Get started</span>
        <h1 data-split style="margin-top:12px">Create your <em>page.</em></h1>
        <p style="color:var(--paper-dim);margin-top:14px">Photographers, filmmakers and producers — list your work and get hired by India's most disciplined brands.</p>
      </div>
      <form class="form" onsubmit="event.preventDefault();this.querySelector('button[type=submit]').textContent='Creating account…'">
        <div class="field-row">
          <div class="field"><label>First name</label><input required></div>
          <div class="field"><label>Last name</label><input required></div>
        </div>
        <div class="field"><label>Email</label><input type="email" required></div>
        <div class="field"><label>Password</label><input type="password" required minlength="8"></div>
        <div class="field"><label>Discipline</label>
          <select><option>Photographer</option><option>Cinematographer</option><option>Editor / Colorist</option><option>Producer</option><option>Director</option></select>
        </div>
        <button type="submit" class="btn btn--red" data-magnetic style="justify-content:center">Create account <span class="arr"></span></button>
      </form>
      <div class="swap">Already have an account? <a href="login.html">Sign in →</a></div>
    </div>
  </section>
