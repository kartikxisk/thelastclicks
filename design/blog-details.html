<script>
const POSTS = {
  'color-pipeline': {
    title: 'What a brand-grade color pipeline actually looks like',
    cat: 'Craft', date: '04 May 2026', read: '6 min read', author: 'Aarav Khanna',
    cover: 'https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=2000&q=85',
    heroHTML: 'What a brand-grade color <em>pipeline</em> actually looks like.',
    body: `<p>Color is authorship. The hand that lit the film should be the one grading it — and yet most studios outsource the grade to whoever's cheapest. The result is footage that arrives looking like every other shoot that's ever happened.</p>
    <p>For premium brands, that's a critical failure. The grade is where the brand actually shows up — its temperature, its tonal range, its specific way of treating skin or product. If you can't control that, you can't carry the brand.</p>
    <h2>The <em>three-stage</em> look-build</h2>
    <p>Every project we run starts with a look-build before the camera rolls. We grade reference stills from the brand's existing library, lock a single approved look, then derive a shoot LUT from it. The LUT goes on every monitor on set.</p>
    <blockquote>The grade isn't a finish line. It's a starting line we cross every shoot day.</blockquote>
    <p>Once we wrap, the conform happens in DaVinci Resolve under an ACES color-managed pipeline. Primary balance scene-by-scene, then secondary work for skin, sky, brand-critical product surfaces. Every node documented.</p>
    <h2>What you actually <em>get</em></h2>
    <ul>
      <li>A documented LUT pack that survives the project</li>
      <li>Scene-balanced masters in Rec. 709 + DCI-P3 + HDR-ready</li>
      <li>Versioned color decisions — every revision tracked</li>
      <li>Re-grade rights for two years, no re-fee</li>
    </ul>
    <p>This isn't extra work. It's the work. And it's why we never let anyone else touch it.</p>`,
    next: { slug: 'three-day-shoot', label: 'How we plan a 3-day brand shoot in 5 days flat' }
  },
  'three-day-shoot': {
    title: 'How we plan a 3-day brand shoot in 5 days flat',
    cat: 'Process', date: '22 Apr 2026', read: '4 min read', author: 'Maya Iyer',
    cover: 'https://images.unsplash.com/photo-1554048612-b6a482bc67e5?w=2000&q=85',
    heroHTML: 'How we plan a <em>3-day</em> brand shoot in five days flat.',
    body: `<p>Pre-production used to be the part of the project that ran late. We rebuilt it from scratch in 2024 — and now we lock a complete 3-day brand shoot in five working days. Here's the actual schedule.</p>
    <h2>Day 1 — <em>Discovery.</em></h2>
    <p>A single 2-hour kickoff with the brand's marketing lead, brand-guideline owner, and our director. Outputs: a one-page creative thesis, success metrics, deliverables list, and a list of any third parties (talent agencies, locations) we need to engage.</p>
    <h2>Day 2 — <em>Treatment.</em></h2>
    <p>Our director writes the treatment overnight after Day 1. Day 2 is a review session. We adjust, lock the creative direction, and confirm visual references. Nothing leaves this day un-aligned.</p>
    <h2>Day 3 — <em>Logistics.</em></h2>
    <p>Producer takes over. Locations recced, permits applied, casting shortlisted, crew confirmed. Kit list locked against budget. A draft call sheet by EOD.</p>
    <h2>Day 4 — <em>Lock.</em></h2>
    <p>Final call sheet. Schedule signed off by all departments. Risk register reviewed (weather, talent availability, location backups). Brand-side review of casting + locations.</p>
    <h2>Day 5 — <em>Eve.</em></h2>
    <p>Final tech tests, kit pulls, talent confirms. The night before the shoot is for sleep, not for surprises.</p>
    <p>It works because we stopped negotiating with ourselves. Every step has a deliverable, a deadline, and an owner. No drift.</p>`,
    next: { slug: 'lens-kit', label: 'The lens kit that survived 12 destination weddings' }
  },
  'lens-kit': {
    title: 'The lens kit that survived 12 destination weddings',
    cat: 'Kit', date: '14 Apr 2026', read: '5 min read', author: 'Aarav Khanna',
    cover: 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=2000&q=85',
    heroHTML: 'The lens kit that survived <em>12</em> destination weddings.',
    body: `<p>Twelve destinations in 2025. Mountains, beaches, lake palaces, desert, monsoon rains. One kit followed us through all of them. Here's what made the cut — and what didn't.</p>
    <h2>The <em>workhorse</em>: Sigma 35mm f/1.4 DG DN Art</h2>
    <p>If we could only take one lens, it's this. Fast enough for low-light ceremonies, wide enough for groups, tight enough for portraits. We've shot 80% of every wedding on the 35.</p>
    <h2>The <em>storyteller</em>: Sigma 85mm f/1.4 DG DN Art</h2>
    <p>For tight portraits and emotional moments — the bride's mother watching the saat-phere, the groom seeing his partner for the first time. Compression flatters. The 85 is the wedding-film grammar of a close-up.</p>
    <blockquote>If you can only carry two primes, make them a 35 and an 85. Everything else is a luxury.</blockquote>
    <h2>The <em>insurance</em>: Sigma 70mm f/2.8 Macro</h2>
    <p>Details. Rings, embroidery, signatures. Three weddings in 2025 had macros that became the cover stills.</p>
    <h2>What got <em>cut</em></h2>
    <p>The 24-70 zoom. Reliable, sharp, but it teaches you to be lazy. Primes force composition. We left it at home for the last six weddings and didn't miss it once.</p>`,
    next: { slug: 'compliance', label: 'Compliance is a creative constraint, not a creative tax' }
  },
  'compliance': {
    title: 'Compliance is a creative constraint, not a creative tax',
    cat: 'Brand', date: '03 Apr 2026', read: '7 min read', author: 'Maya Iyer',
    cover: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=2000&q=85',
    heroHTML: 'Compliance is a <em>creative</em> constraint, not a tax.',
    body: `<p>Most studios groan when a regulated-brand brief lands. Beverage, automotive, pharma — all of it comes with rules. Where you can shoot, who can hold the product, what voiceover can claim. The instinct is to treat the rules as overhead.</p>
    <p>That instinct is wrong. Compliance is the most creative constraint you'll ever encounter, because it eliminates the easy shot. You can't lazily put the bottle in a young person's hand. You can't promise a feeling the product can't deliver. What's left is the actual idea.</p>
    <h2>What we've <em>learned</em></h2>
    <p>Two years of working in regulated categories has changed the way we treat every brief — even unregulated ones. We now ask three questions before we touch a camera:</p>
    <ul>
      <li>What can we show?</li>
      <li>What can we say?</li>
      <li>What must the viewer feel without us showing or saying it?</li>
    </ul>
    <p>The third question is where the actual film lives. Compliance forces you to find it.</p>
    <blockquote>Constraints are the brief. The brief inside the brief.</blockquote>
    <p>For brands considering us for regulated work: we've never had a flagged frame in delivery. Not because we follow the rules — but because we treat them as the creative starting line.</p>`,
    next: { slug: '12-city-launch', label: 'Notes from a 12-city automotive launch' }
  },
  '12-city-launch': {
    title: 'Notes from a 12-city automotive launch',
    cat: 'Field', date: '21 Mar 2026', read: '3 min read', author: 'Nisha Rao',
    cover: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=2000&q=85',
    heroHTML: 'Notes from a <em>12-city</em> automotive launch.',
    body: `<p>Twelve cities in eighteen days. Three unit cars, one director, two camera teams, one producer who didn't sleep. Here's what we got right, what we got wrong, and what we'd never do again.</p>
    <h2>What <em>worked</em></h2>
    <p>Splitting the unit. Camera A travelled with the lead director for hero shots. Camera B leapfrogged ahead with a 2nd unit DOP for environmental coverage. We never lost a day to weather because at least one team was always at the next stop.</p>
    <h2>What <em>broke</em></h2>
    <p>The shared edit pipeline. We assumed our editor could keep up with rushes while we travelled. By city six, we were two cities ahead of the edit. We fixed it by adding a second editor in week two.</p>
    <blockquote>Multi-city shoots need multi-city post. Plan both before you book the first flight.</blockquote>
    <h2>What we'd <em>never</em> do again</h2>
    <p>Three cities in 24 hours. The footage looked tired because we were tired. From now on, every shoot day gets a buffer day after travel.</p>`,
    next: { slug: 'studio-tv', label: 'Why we still cut every reel on the studio TV first' }
  },
  'studio-tv': {
    title: 'Why we still cut every reel on the studio TV first',
    cat: 'Studio', date: '09 Mar 2026', read: '4 min read', author: 'Rohan Bose',
    cover: 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=2000&q=85',
    heroHTML: 'Why we still cut every reel on the <em>studio TV</em> first.',
    body: `<p>Our studio has a 65-inch TV mounted in the edit bay. Every reel — brand film, social cutdown, same-day wedding edit — gets watched on it before it ships. We do this because clients watch on phones, on laptops, on TVs at 4K, on Instagram at 480p. The TV is our worst-case viewing experience for premium work, and our best for events.</p>
    <h2>What the TV <em>catches</em></h2>
    <p>Compression. A grade that looked rich on a calibrated monitor turns to mud on a TV. Blacks that crushed gracefully turn into a void. Skies that were clean develop banding.</p>
    <blockquote>If the cut works on the cheap TV, it works everywhere. If it doesn't, the cut isn't done.</blockquote>
    <h2>What the TV <em>misses</em></h2>
    <p>Mobile-specific cropping. Vertical legibility. So we also have a phone rig — three phones at three brightness levels — that every social cut passes through before delivery. Same principle, different surface.</p>`,
    next: { slug: 'color-pipeline', label: 'What a brand-grade color pipeline actually looks like' }
  }
};

const slug = new URLSearchParams(location.search).get('slug') || 'color-pipeline';
const p = POSTS[slug] || POSTS['color-pipeline'];
document.title = p.title + ' — TheLastClicks Journal';

document.querySelectorAll('[data-out]').forEach(el => {
  const k = el.dataset.out;
  const map = {
    title: p.title, hero: p.heroHTML, cat: p.cat, date: p.date, read: p.read,
    author: p.author, authorName: p.author,
    avatar: p.author.split(' ').map(w => w[0]).join(''),
    'next-label': p.next.label,
  };
  if (map[k] !== undefined) el.innerHTML = map[k];
});
document.querySelector('[data-out-src="cover"]').src = p.cover;
document.querySelector('[data-out-html="body"]').innerHTML = p.body;
document.querySelectorAll('[data-out-href]').forEach(el => {
  const k = el.dataset.outHref;
  if (k === 'next-href') el.href = 'blog-details.html?slug=' + p.next.slug;
  if (k === 'twitter') el.href = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(p.title);
  if (k === 'linkedin') el.href = 'https://linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(location.href);
});
</script>
